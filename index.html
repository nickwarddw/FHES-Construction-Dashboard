function getPct(c){if(!c)return 0;if(c.f&&String(c.f).includes('%')){var n=parseFloat(String(c.f).replace('%',''));if(!isNaN(n))return n}var n2=typeof c.v==='number'?c.v:parseFloat(String(c.v));if(isNaN(n2))return 0;if(n2>0&&n2<=1)return n2*100;return n2}
function fmt$(v){if(isNaN(v))return'—';return'$'+Math.round(v).toLocaleString('en-US')}
function fmtM(v){if(isNaN(v))return'—';if(Math.abs(v)>=1e9)return'$'+(v/1e9).toFixed(1)+'B';if(Math.abs(v)>=1e6)return'$'+(v/1e6).toFixed(1)+'M';if(Math.abs(v)>=1e3)return'$'+(v/1e3).toFixed(0)+'K';return'$'+Math.round(v).toLocaleString('en-US')}
function fmtPct(v,d){return v.toFixed(d!==undefined?d:1)+'%'}
function pCol(p){if(p>=100)return'fill-green';if(p>=40)return'fill-amber';if(p>0)return'fill-accent';return'fill-navy'}
function sCls(s){if(!s)return'upcoming';var l=s.toLowerCase().trim();if(l==='complete'||l==='completed')return'complete';if(l==='in progress')return'in-progress';if(l==='pre-bid')return'pre-bid';if(l==='on schedule')return'on-schedule';if(l==='on budget')return'on-budget';if(l.includes('below'))return'below-goal';if(l.includes('above')||l.includes('meeting'))return'meeting-goal';return'upcoming'}
function safe(d,r,c){if(r>=0&&r<d.length&&c>=0&&c<d[r].length)return d[r][c];return null}
function fmtDate(s){if(!s)return'';try{if(String(s).match(/20\d\d/)){var d=new Date(s);if(!isNaN(d))return(d.getMonth()+1)+'/'+d.getDate()+'/'+(d.getFullYear()%100)}}catch(e){}return String(s)}
// Month-only format for construction schedule (e.g. "June 2027")
function fmtMonth(s){if(!s)return'';var mos=['January','February','March','April','May','June','July','August','September','October','November','December'];try{var d=new Date(s);if(!isNaN(d))return mos[d.getMonth()]+' '+d.getFullYear()}catch(e){}return String(s)}
// Search col for label — only used as fallback
function findRow(rows,label,col){var lbl=label.toLowerCase();for(var i=0;i<rows.length;i++){if(getStr(safe(rows,i,col)).toLowerCase().includes(lbl))return i}return-1}

async function build(){

try{

// Google Sheets drops Excel rows 1-2 (title + instruction)
